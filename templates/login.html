{% extends 'base.html' %}

{% block title %}Login – EcoTrack AI{% endblock %}

{% block content %}
<div class="container auth-page">
    <div class="glass-card auth-card">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Log in to track your carbon reduction progress</p>
        </div>
        
        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="username_or_email" class="form-label">Username or Email</label>
                <input type="text" id="username_or_email" name="username_or_email" class="form-control" placeholder="Enter username or email" required>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; padding: 12px;">
                <i class="fa-solid fa-right-to-bracket"></i> Log In
            </button>
        </form>
        
        <div class="auth-footer">
            Don't have an account? <a href="{{ url_for('signup') }}">Sign Up</a>
        </div>
    </div>
</div>
{% endblock %}
