{% extends 'base.html' %}

{% block title %}Sign Up – EcoTrack AI{% endblock %}

{% block content %}
<div class="container auth-page">
    <div class="glass-card auth-card">
        <div class="auth-header">
            <h2>Create Account</h2>
            <p>Join EcoTrack AI to start tracking and offsetting emissions</p>
        </div>
        
        <form action="{{ url_for('signup') }}" method="POST">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Create a username" required>
            </div>
            
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Create password" required>
            </div>
            
            <div class="form-group">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Confirm your password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; padding: 12px;">
                <i class="fa-solid fa-user-plus"></i> Create Account
            </button>
        </form>
        
        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('login') }}">Log In</a>
        </div>
    </div>
</div>
{% endblock %}
